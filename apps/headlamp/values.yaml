replicaCount: 1

image:
  pullPolicy: IfNotPresent

config:
  # Modo in-cluster — usa la API del propio cluster
  inCluster: true

# Exponer via Traefik
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: headlamp.192.168.0.240.nip.io
      paths:
        - path: /
          type: Prefix

# RBAC
clusterRoleBinding:
  enabled: true

persistentVolumeClaim:
  enabled: false

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
